<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tejo del Berriondo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=block" rel="stylesheet" />
    <style>
      body { margin: 0; background: #050512; }

      #aviso-movil {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #050512;
        color: white;
        font-family: 'Baloo 2', Arial, sans-serif;
        text-align: center;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
      }

      @media (min-width: 600px) {
        #aviso-movil { display: flex; }
      }

      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100svh;
      }
    </style>
  </head>
  <body>
    <div id="aviso-movil">
      <div style="font-size: 80px;">📱</div>
      <h2 style="color: #FFD700; margin: 20px 0 10px; font-family: 'Baloo 2', Arial;">Solo disponible en móvil</h2>
      <p style="color: #aaaaaa; padding: 0 40px; font-family: 'Baloo 2', Arial;">
        Este juego está diseñado para jugarse desde tu celular.<br><br>
        ¡Ábrelo desde el restaurante!
      </p>
      <div style="font-size: 40px; margin-top: 20px;">🎯</div>
      <button onclick="document.getElementById('aviso-movil').style.display='none'; document.getElementById('app').style.display='flex';"
        style="margin-top: 30px; padding: 15px 40px; background: #8B2500; color: #FFD700; border: 2px solid #FFD700; border-radius: 12px; font-size: 18px; font-family: 'Baloo 2', Arial; cursor: pointer; font-weight: 800; letter-spacing: 1px;">
        Jugar de todas formas →
      </button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
