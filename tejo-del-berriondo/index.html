<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tejo del Berriondo</title>
    <style>
      #aviso-movil {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #1a1a2e;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
      }

      @media (min-width: 600px) {
        #aviso-movil { display: flex; }
        #app { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="aviso-movil">
      <div style="font-size: 80px;">📱</div>
      <h2 style="color: #FFD700; margin: 20px 0 10px;">Solo disponible en móvil</h2>
      <p style="color: #aaaaaa; padding: 0 40px;">
        Este juego está diseñado para jugarse desde tu celular.<br><br>
        ¡Ábrelo desde el restaurante!
      </p>
      <div style="font-size: 40px; margin-top: 20px;">🎯</div>
      <button onclick="document.getElementById('aviso-movil').style.display='none'; document.getElementById('app').style.display='block';"
        style="margin-top: 30px; padding: 15px 40px; background: #8B2500; color: #FFD700; border: 2px solid #FFD700; border-radius: 8px; font-size: 18px; font-family: Arial; cursor: pointer; font-weight: bold;">
        Jugar de todas formas →
      </button>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
